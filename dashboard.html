<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Exam Dashboard</h2>
        <ul>
            <li><a href="Overview.html">Overview</a></li>
            <li><a href="Start_Exam.html">Exams</a></li>

        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <div class="header">
            <h1>Welcome, User!</h1>
            <p>Manage and monitor your exams here.</p>
        </div>

        <!-- Overview Section -->
        <div class="overview">
            <div class="card">
                <h3>Total Questions</h3>
                <p id="totalExams">5</p>
            </div>
            <div class="card">
                <h3>Students Enrolled</h3>
                <p id="totalStudents">120</p>
            </div>
            <div class="card">
                <h3>Pending Results</h3>
                <p id="pendingResults">3</p>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results">
            <h2>Your Exam Results</h2>
            <div id="resultContainer"></div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
